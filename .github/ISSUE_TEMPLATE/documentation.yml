name: Documentation issue
description: Report unclear, incorrect, missing, or broken documentation.
title: "docs: "
labels:
  - documentation
body:
  - type: input
    id: location
    attributes:
      label: Page or section
      placeholder: README.md, docs/config-reference.md, or a URL
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is wrong or unclear?
    validations:
      required: true
  - type: textarea
    id: correction
    attributes:
      label: Suggested correction
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched for an existing report.
          required: true
        - label: The proposed repository-facing text is in English.
          required: true
