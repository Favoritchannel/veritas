name: Feature request
description: Propose a focused improvement or new capability.
title: "feature: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operator problem should be solved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed outcome
      description: Describe observable behavior rather than only an implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: true
  - type: textarea
    id: trust-impact
    attributes:
      label: Evidence, security, and compatibility impact
      description: Explain changes to trust semantics, data access, costs, or public interfaces.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues, pull requests, and the production roadmap.
          required: true
        - label: I understand that a proposal is not a commitment or production guarantee.
          required: true
