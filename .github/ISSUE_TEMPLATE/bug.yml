name: Bug report
description: Report a reproducible problem in Veritas KB.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: >-
        Remove credentials, private corpora, and personal data. Security vulnerabilities belong in private
        vulnerability reporting, not this form.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or full commit SHA
    validations:
      required: true
  - type: dropdown
    id: operating-system
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js and npm versions
      placeholder: Node 24.x, npm 11.x
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include exact commands and a minimal sanitized configuration.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and logs
      description: Paste only sanitized logs.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and pull requests.
          required: true
        - label: This report contains no secrets, personal data, or private corpus content.
          required: true
        - label: I can reproduce the problem on a supported Node.js version.
          required: true
